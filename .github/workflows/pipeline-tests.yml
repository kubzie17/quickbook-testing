name: Pipeline Test Suite

on: 
  push:
    branches: [task-one]

  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install root dependencies
        run: npm install

      - name: Install backend deps
        run: |
          cd backend
          npm install

      - name: Run unit tests
        run: |
          cd backend
          npm test

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run API tests
        run: |
          mkdir -p reports
          newman run postman/quickbook-api.postman_collection.json \
          -e postman/quickbook-render.postman_environment.json \
          -r cli,htmlextra \
          --reporter-htmlextra-export reports/api-report.html

      - name: Install frontend deps
        run: |
          cd frontend
          npm install
      
      - name: Run ESLint
        run: |
          cd frontend
          npm run lint
          npx eslint . -f json -o eslint-report.json || true

          errors=$(cat eslint-report.json | jq '[.[].errorCount] | add')
          echo "Total eslint error: $errors"

          if [ "$errors" -ge 10]; then 
            echo "eslint failed: error count ($errors) exceeds threshold of 10"
          fi

      - name: Start backend
        run: |
          cd backend
          node server.js &

      - name: Start frontend
        run: |
          cd frontend
          npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        env:
          CI: true
          # INTENTIONAL BUG:
          # This API URL is wrong.
          # The frontend will run, but API requests may fail.
          VITE_API_BASE_URL: http://localhost:3001

      - name: Wait for frontend
        run: npx wait-on http://localhost:5173 --timeout 120000

      - name: Show frontend log
        if: always()
        run: cat frontend.log

      - name: Install Cypress binary
        run: npx cypress install

      - name: Verify Cypress
        run: npx cypress verify

      - name: Run Cypress tests
        run: npx cypress run --browser electron

      - name: Upload API report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: api-report
          path: reports/api-report.html

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cypress-screenshots
          path: cypress/screenshots