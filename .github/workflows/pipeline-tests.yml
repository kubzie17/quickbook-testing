name: Pipeline Testing

on: 
  push: 
    branches: [quick-book-lucy]

jobs: 
  jobOne: 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with: 
          node-version: 22

      #install root dependencies
      - name: Install Root Dependencies 
        run: npm install 

      #install backend dependencies
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install 
      
      #install frontend dependencies
      - name: Install Frontend Dependencies
        run: | 
          cd frontend
          npm install

      #run unit tests
      - name: Run Unit Tests  
        run: |
          cd backend
          npm test

      #Frontend
      - name: Start Frontend Server
        run: |
          cd frontend
          npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        env:
          CI: true
          VITE_API_BASE_URL: https://quickbook-testing.onrender.com
      
      - name: Wait On Frontend
        run: npx wait-on http://localhost:5173 --timeout 120000

      - name: show the front end log
        if: always()
        run: cat frontend.log

      #CYPRESS 
      - name: Install cypress
        run: npx cypress install

      - name: Verify cypress
        run: npx cypress verify

      - name: Run cypress Tests
        run: npx cypress run --browser electron



     
      
        
        