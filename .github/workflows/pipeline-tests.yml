name: Pipeline Test Suite

on:
  push:
    branches: [debugging]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

#Root Install
      - name: Install root dependencies
        run: npm install 
      
      - name: Check for vulnerabilities in root
        run: |
          npm audit --json > root-audit-report.json || true
          critical=$(jq '.metadata.vulnerabilities.critical' root-audit-report.json)
          moderate=$(jq '.metadata.vulnerabilities.moderate' root-audit-report.json)
          low=$(jq '.metadata.vulnerabilities.low' root-audit-report.json)
          total=$(jq '.metadata.vulnerabilities.total' root-audit-report.json)
          echo "Total critical vulnerabilities: $critical"
          echo "Total moderate vulnerabilities: $moderate"
          echo "Total low vulnerabilities: $low"

          if [ "$total" -gt 3 ]; then
            echo "($total) total vulnerabilities found, exceeding threshold of 3. ($critical) critical, ($moderate) moderate, ($low) low. Failing the build."
            exit 1
          else
            echo "Vulnerabilities are within acceptable limits: ($total) <= 3"
          fi

#Backend Install
      - name: Install backend deps
        run: |
          cd backend
          npm install

      - name: Check for vulnerabilities in backend
        run: |
          cd backend
          npm audit --json > backend-audit-report.json || true
          vulnerabilities=$(jq '.metadata.vulnerabilities.total' backend-audit-report.json)
          echo "Total vulnerabilities: $vulnerabilities"

          if [ "$vulnerabilities" -gt 3 ]; then
            echo "($vulnerabilities) vulnerabilities found, exceeding threshold of 3. Failing the build."
            exit 1
          else
            echo "Vulnerabilities are within acceptable limits: ($vulnerabilities) <= 3"
          fi
      
      

#Frontend Install
      - name: Install frontend deps
        run: |
          cd frontend
          npm install
      
      - name: Check for vulnerabilities in frontend
        run: |
          cd frontend
          npm audit --json > frontend-audit-report.json || true
          vulnerabilities=$(jq '.metadata.vulnerabilities.total' frontend-audit-report.json)
          echo "Total vulnerabilities: $vulnerabilities"

          if [ "$vulnerabilities" -gt 3 ]; then
            echo "($vulnerabilities) vulnerabilities found, exceeding threshold of 3. Failing the build."
            exit 1
          else
            echo "Vulnerabilities are within acceptable limits: ($vulnerabilities) <= 3"
          fi
    
     

#Frontend Lint Tests
      - name: Run ESLint
        run: |
          cd frontend
          npx eslint . -f json -o eslint-report.json || true

          errors=$(cat eslint-report.json | jq '[.[].errorCount] | add')
          echo "Total ESLint errors: $errors"

          if [ "$errors" -gt 10 ]; then
            echo "ESLint error count ($errors) exceed threshold of 10. Failing the build."
            exit 1
          else
            echo "ESLint errors are within acceptable limits: ($errors) <= 10"
          fi

#Backend (Unit) Tests
      - name: Run unit tests
        run: |
          cd backend
          npm test

#API Tests
      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run API tests
        run: |
          mkdir -p reports
          newman run postman/quickbook-api.postman_collection.json \
          -e postman/quickbook-render.postman_environment.json \
          -r cli,htmlextra \
          --reporter-htmlextra-export reports/api-report.html

#Frontend (E2E) Tests
      - name: Start frontend
        run: |
          touch frontend.log
          cd frontend
          npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        env:
          CI: true
          VITE_API_BASE_URL: https://quickbook-testing.onrender.com

      - name: Wait for frontend
        run: npx wait-on http://localhost:5173 --timeout 120000

      - name: Show frontend log
        if: always()
        run: cat frontend.log || echo "No frontend log found"

      - name: Install Cypress binary
        run: npx cypress install

      - name: Verify Cypress
        run: npx cypress verify

      - name: Run Cypress tests
        run: npx cypress run --browser electron

      - name: Upload API report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: api-report
          path: reports/api-report.html

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cypress-screenshots
          path: cypress/screenshots
      
