name: Pipeline Test Suite

on: 
  push:
    branches: [task-one]

jobs:
  jobInstallation:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: Install node 
        uses: actions/setup-node@v4
        with: 
          node-version: 22
    # installing root dependencies 
      - name: install root dependencies 
        run:  npm install  
    # installing backend dependencies 
      - name: install backend dependencies 
        run: |
          cd backend
          npm install 

      - name: install frontend dependencies 
        run: |
          cd frontend
          npm install

    # installing tests 
      - name: installing tests 
        run: |
            cd backend
            npm test

  jobFrontend:
    needs: jobInstallation
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: Install node 
        uses: actions/setup-node@v4
        with: 
          node-version: 22
    # starting frontend
      - name: Starting frontend
        run: |
            cd frontend
            npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        env:
          CI: true
          VITE_API_BASE_URL: https://quickbook-testing.onrender.com

      - name: wait for frontend 
        run: npx wait-on http://localhost:5173 --timeout 120000

      - name: show the frontend log 
        if: always()
        run: cat frontend.log

  
  jobCypress:
    needs: [jobInstallation, jobFrontend]
    runs-on: ubuntu-latest
    
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: Install node 
        uses: actions/setup-node@v4
        with: 
          node-version: 22
      - name: Install Cypress
        run: npx cypress install 
      
      - name: Verify Cypress 
        run: npx cypress verify

      - name: Run Cypress
        run: npx cypress run --browser electron
        




      

    
             
        

