name: Pipeline Test Suite

on:
  push:
    branches: [ quick-book-lucy ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install 
      
      - name: Check for vulnerabilities in root
        run: npm audit --audit-level=moderate || echo "Vulnerabilities found in root dependencies"
        continue-on-error: true
      
      - name: Update root dependencies
        run: |
          npm audit fix
          echo "Vulnerabilities fixed in root dependencies"
        continue-on-error: true

      - name: Install backend deps
        run: |
          cd backend
          npm install
      - name: Check for vulnerabilities in backend
        run: |
          cd backend
          npm audit --audit-level=moderate || echo "Vulnerabilities found in backend dependencies"
        continue-on-error: true
      
      - name: Update backend dependencies
        run: |
          cd backend
          npm audit fix
          echo "Vulnerabilities fixed in backend dependencies"
        continue-on-error: true

      - name: Run unit tests
        run: |
          cd backend
          npm test
      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run API tests
        run: |
          mkdir -p reports
          newman run postman/quickbook-api.postman_collection.json \
          -e postman/quickbook-render.postman_environment.json \
          -r cli,htmlextra \
          --reporter-htmlextra-export reports/api-report.html
      - name: Install frontend deps
        run: |
          cd frontend
          npm install
      
      - name: Check for vulnerabilities in frontend
        run: |
          cd frontend
          npm audit --audit-level=moderate || echo "Vulnerabilities found in frontend dependencies"
        continue-on-error: true
    
      - name: Update frontend dependencies
        run: |
          cd frontend
          npm audit fix
          echo "Vulnerabilities fixed in frontend dependencies"
        continue-on-error: true

      - name: Start frontend
        run: |
          touch frontend.log
          cd frontend
          npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        env:
          CI: true
          VITE_API_BASE_URL: https://quickbook-testing.onrender.com

      - name: Wait for frontend
        run: npx wait-on http://localhost:5173 --timeout 120000

      - name: Show frontend log
        if: always()
        run: cat frontend.log || echo "No frontend log found"

      - name: Install Cypress binary
        run: npx cypress install

      - name: Verify Cypress
        run: npx cypress verify

      - name: Run Cypress tests
        run: npx cypress run --browser electron

      - name: Upload API report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: api-report
          path: reports/api-report.html

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cypress-screenshots
          path: cypress/screenshots