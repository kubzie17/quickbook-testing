name: Charlottes Pipeline

on:
  push:
    branches: [charlottes-branch]

jobs:
  firstJob:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # install root dependencies
      - name: install root dependencies
        run: npm install
