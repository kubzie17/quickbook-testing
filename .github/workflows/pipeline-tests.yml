name: Pipeline Test Suite

on:
  push:
    branches: [ task-one ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      # TASK 2 
      # VULNERABILITY SCAN:
      # npm audit checks all installed dependencies for known security vulnerabilities.
      # json outputs the results in JSON format so can parse them.
      # || true prevents the step from failing immediately (npm audit exits non-zero if it finds issues).
      # We use jq to extract the count of high and critical severity vulnerabilities.
      # If that count is 3 or more, we fail the pipeline with exit 1.
      # This lets us tolerate a few minor issues while catching serious security risks.


      - name: Checking for vulnerabilities 
        run: |
          audit_output=$(npm audit --json || true)
          
          echo "Vulnerabilities Summary"
          echo "$audit_output" | jq '.metadata.vulnerabilities'

          echo ""
          echo "Critical"
          echo "$audit_output" | jq '[.vulnerabilities | to_entries[] | select(.value.severity == "critical") | .key] | if length == 0 then "None" else .[] end'

          echo ""
          echo "Moderate"
          echo "$audit_output" | jq '[.vulnerabilities | to_entries[] | select(.value.severity == "moderate") | .key] | if length == 0 then "None" else .[] end'

          echo ""
          echo "Low"
          echo "$audit_output" | jq '[.vulnerabilities | to_entries[] | select(.value.severity == "low") | .key] | if length == 0 then "None" else .[] end'

          vuln_count=$(echo "$audit_output" | jq '.metadata.vulnerabilities.moderate + .metadata.vulnerabilities.critical')
          echo "Total high/critical vulnerabilities: $vuln_count"

          if [ "$vuln_count" -ge 10 ]; then
            echo "Audit failed: $vuln_count high/critical vulnerabilities exceeds threshold of 10"
            exit 1
          else
            echo "Audit passed: $vuln_count is within threshold"
            fi

      # INTENTIONAL BUG:
      # Backend unit tests are missing from this pipeline.
      # The pipeline can pass even if the unit tests are broken.

      - name: Install backend deps
        run: |
          cd backend
          npm install
      
      - name: Run unit tests 
        run: |
          cd backend 
          npm test

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run API tests
        run: |
          mkdir -p reports
          newman run postman/quickbook-api.postman_collection.json \
          -e postman/quickbook-render.postman_environment.json \
          -r cli,htmlextra \
          --reporter-htmlextra-export reports/api-report.html

      - name: Install frontend deps
        run: |
          cd frontend
          npm install

      - name: Start frontend
        run: |
          cd frontend
          npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        env:
          CI: true
          VITE_API_BASE_URL: https://quickbook-testing.onrender.com

      - name: Wait for frontend
        run: npx wait-on http://localhost:5173 --timeout 120000

      - name: Show frontend log
        if: always()
        run: cat frontend.log

      - name: Install Cypress binary
        run: npx cypress install

      - name: Verify Cypress
        run: npx cypress verify

      - name: Run Cypress tests
        run: npx cypress run --browser electron

      - name: Upload API report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: api-report
          path: reports/api-report.html

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cypress-screenshots
          path: cypress/screenshots