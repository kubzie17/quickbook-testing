name: phoenix 

on: 
  push: 
    branches: [tyreece]

jobs:
  jobOne:
    runs-on: ubuntu-latest

    steps:
      - name: checkout branch
        uses: actions/checkout@v4

      - name: node -i
        uses: actions/setup-node@v4
        with: 
            node-version: 22

      # dependencies 
      
      - name: install root dependencies
        run: npm i

      - name: install backend dependencies
        run: |
          cd backend
          npm install
        
      - name: install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: unit testing
        run: |
          cd backend 
          npm test    