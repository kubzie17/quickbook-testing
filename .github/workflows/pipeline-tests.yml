name: Pipeline Test Suite

on:
  push:
    branches: [debugging]


jobs:
  setup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install root dependencies
        run: npm install
      
      - name: Install backend dependencies
        run: |
          cd backend
          npm install
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

  frontend:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Start frontend server
        run: |
          cd frontend
          npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        env: 
          CI: true
          VITE_API_BASE_URL: https://quickbook-testing.onrender.com
      
      - name: Wait for frontend
        run: npx wait-on http://localhost:5173 --timeout 120000

      - name: Show the frontend log
        if: always()
        run: cat frontend.log


  unit-tests:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Run backend (unit) tests
        run: |
          cd backend
          npm test

  cypress:
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Install Cypress
        run: npx cypress install

      - name: Verify Cypress
        run: npx cypress verify
      
      - name: Run Cypress tests
        run: npx cypress run --browser electron
