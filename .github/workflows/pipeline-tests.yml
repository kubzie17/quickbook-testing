name: phoenix 

on: 
  push: 
    branches: [tyreece]

jobs:
  jobOne:
    runs-on: ubuntu-latest

    steps:
      - name: checkout branch
        uses: actions/checkout@v4

      - name: node -i
        uses: actions/setup-node@v4
        with: 
            node-version: 22


      # dependencies

      - name: install root packages
        run: npm i

      - name: install backend packages
        run: |
          cd backend
          npm i

      - name: install frontend packages
        run: |
          cd frontend
          npm i

      - name: run backend tests
        run: |
          cd backend
          npm test

      - name: start frontend server
        run: |
          cd frontend
          npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        env:
          CI: true
          VITE_API_BASE_URL: https://quickbook-testing.onrender.com

      - name: wait for frontend
        run: npx wait-on http://localhost:5173 --timeout 120000

      - name: display frontend server logs
        if: always()
        run: cat frontend.log



      - name: install cypress
        run: npx cypress install

      - name: verify cypress
        run: npx cypress verify

      - name: run cypress tests
        run: npx cypress run --browser electron

      