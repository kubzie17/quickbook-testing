name: Pipeline Test Suite

on:
  push:
    branches: [debugging]


jobs:
  first-job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
     
      #ROOT
      - name: Install root dependencies
        run: npm install
      
      #BACKEND
      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Run backend (unit) tests
        run: |
          cd backend
          npm test
     
      #FRONTEND 
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
      
      - name: Start frontend server
        run: |
          cd frontend
          run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        env: 
          CI: true
          VITE_API_BASE_URL: https://quickbook-testing.onrender.com
      
      

