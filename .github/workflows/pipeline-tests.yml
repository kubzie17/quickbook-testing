name: phoenix

on:
  push:
    branches: [tyreece]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

  install:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm i
      - run: cd backend && npm i
      - run: cd frontend && npm i

  unit-test:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm i
      - run: cd backend && npm i
      - run: cd backend && npm test

  e2e-test:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm i
      - run: cd frontend && npm i
      - name: start frontend server
        run: |
          cd frontend
          npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        env:
          CI: true
          VITE_API_BASE_URL: https://quickbook-testing.onrender.com
      - run: npx wait-on http://localhost:5173 --timeout 120000
      - name: display frontend server logs
        if: always()
        run: cat frontend.log
      - run: npx cypress install
      - run: npx cypress verify
      - run: npx cypress run --browser electron
