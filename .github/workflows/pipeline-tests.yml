# ============================================================
# THURS 30 APRIL - TASK 1: Fix broken pipeline
# Fixed: deprecated actions (v4 -> v6/v7)
# Fixed: added missing backend deps install + unit tests
# Fixed: added missing backend server start
# ============================================================

name: Pipeline Testing

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      # --------------------------
      # UNIT TESTS (JEST) - FIX: was missing from broken pipeline
      # --------------------------
      - name: Install backend deps
        run: |
          cd backend
          npm install

      - name: Run unit tests
        run: |
          cd backend
          npm test

      # --------------------------
      # ESLINT
      # --------------------------
      - name: Install frontend deps
        run: |
          cd frontend
          npm install

      - name: Run eslint
        run: |
          cd frontend
          npm i eslint
          npx eslint . -f json -o eslint-report.json || true

          errors=$(cat eslint-report.json | jq '[.[].errorCount] | add')
          echo "Total eslint errors: $errors"

          if [ "$errors" -ge 10 ]; then
            echo "eslint failed: error count ($errors) exceeds threshold of 10"
            exit 1
          else
            echo "eslint passed: error count ($errors) is less than threshold of 10"
          fi

      # ============================================================
      # THURS 30 APRIL - TASK 2: Vulnerability check
      # Runs npm audit and fails if more than 3 vulnerabilities
      # ============================================================
      - name: Run vulnerability check
        run: |
          echo "Running npm audit for vulnerabilities..."
          npm audit --json > audit-report.json || true

          vuln_count=$(cat audit-report.json | jq '.metadata.vulnerabilities | to_entries | map(.value) | add')
          echo "Total vulnerabilities found: $vuln_count"

          if [ "$vuln_count" -gt 3 ]; then
            echo "Vulnerability check FAILED: $vuln_count vulnerabilities found (threshold: 3)"
            exit 1
          else
            echo "Vulnerability check PASSED: $vuln_count vulnerabilities found (threshold: 3)"
          fi

      # --------------------------
      # API TESTS (NEWMAN)
      # --------------------------
      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run API tests
        run: |
          mkdir -p reports
          newman run postman/quickbook-api.postman_collection.json \
          -e postman/quickbook-render.postman_environment.json \
          -r cli,htmlextra \
          --reporter-htmlextra-export reports/api-report.html

      # --------------------------
      # E2E TESTS (CYPRESS)
      # --------------------------
      - name: Start backend
        run: |
          cd backend
          node server.js &

      - name: Start frontend
        run: |
          cd frontend
          npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        env:
          CI: true
          VITE_API_BASE_URL: https://quickbook-testing.onrender.com

      - name: Wait for frontend
        run: npx wait-on http://localhost:5173 --timeout 120000

      - name: Show frontend log
        if: always()
        run: cat frontend.log

      - name: Install Cypress binary
        run: npx cypress install

      - name: Verify Cypress
        run: npx cypress verify

      - name: Run Cypress tests
        run: npx cypress run --browser electron

      # --------------------------
      # ARTIFACTS
      # --------------------------
      - name: Upload API report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-report
          path: reports/api-report.html

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots
          path: cypress/screenshots
