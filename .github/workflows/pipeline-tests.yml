name: Charlottes Pipeline

on:
  push:
    branches: [charlottes-branch]

jobs:
  First Job installation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # install root dependencies
      - name: install root dependencies
        run: npm install

      # install backend dependencies
      - name: install backend dependencies
        run: |
          cd backend
          npm install

      # install frontend dependencies
      - name: install frontend dependencies
        run: |
          cd frontend
          npm install

  Second Job Running tests:
    runs-on: ubuntu-latest

    steps:
      - name: Run tests
        run: |
          cd backend
          npm test
  
  Third Job Starting frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Start frontend
        run: |
          cd frontend
          npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 & 
        env: 
          CI: true
          VITE_API_BASE_URL: https://quickbook-testing.onrender.com
        
      - name: Wait for frontend to start
        run: npx wait-on http://localhost:5173 --timeout 120000

      - name: Show frontend log 
        if: always()
        run: cat frontend.log
  
  Forth Job Cypress:
    runs-on: ubuntu-latest

    steps:
      - name: Installing cypress
        run: npx cypress install
      
      - name: Verfying cypress install
        run: npx cypress verify

      - name: Run cypress tests 
        run: npx cypress run --browser electron
