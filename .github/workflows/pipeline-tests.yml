name: Pipeline Test Suite

on: 
  push: 
    branches: [newbranch]


jobs: 
  setup: 
    runs-on: ubuntu-latest

    steps: 
      - name: checkout repo
        uses: actions/checkout@v5

      - name: Install node
        uses: actions/setup-node@v5
        with: 
          node-version: 22

      - name: install root dependencies
        run: npm install

      - name: install backend dependencies
        run: |
          cd backend
          npm install

      - name: install frontend dependencies
        run: |
          cd frontend
          npm install

  frontend-installations: 
    runs-on: ubuntu-latest
    needs: [setup]

    steps: 
      - name: checkout repo
        uses: actions/checkout@v5

      - name: Install node
        uses: actions/setup-node@v5
        with: 
          node-version: 22

      - name: install root dependencies
        run: npm install

      - name: install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: run frontend
        run: |
          cd frontend
          npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        env: 
          CI: true
          VITE_API_BASE_URL: https://quickbook-testing.onrender.com

      - name: wait for frontend
        run: npx wait-on http://localhost:5173 --timeout 120000

      - name: show the front end log
        if: always()
        run: cat frontend.log

  backend-tests: 
    runs-on: ubuntu-latest
    needs: [setup]

    steps: 
      - name: checkout repo
        uses: actions/checkout@v5

      - name: Install node
        uses: actions/setup-node@v5
        with: 
          node-version: 22

      - name: install backend dependencies
        run: |
          cd backend
          npm install

      - name: run tests
        run: |
          cd backend
          npm test

  cypress: 
    runs-on: ubuntu-latest
    needs: [frontend-installations, backend-tests]

    steps: 
      - name: checkout repo
        uses: actions/checkout@v5

      - name: Install node
        uses: actions/setup-node@v5
        with: 
          node-version: 22

      - name: install root dependencies
        run: npm install

      - name: install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: run frontend
        run: |
          cd frontend
          npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        env: 
          CI: true
          VITE_API_BASE_URL: https://quickbook-testing.onrender.com

      - name: wait for frontend
        run: npx wait-on http://localhost:5173 --timeout 120000

      - name: install cypress
        run: npx cypress install

      - name: verify cypress
        run: npx cypress verify

      - name: run cypress tests
        run: npx cypress run --browser electron
