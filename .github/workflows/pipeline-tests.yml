name: Charlottes Test Suite

on:
  push:
    branches: [charlottes-branch]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      # INTENTIONAL BUG:
      # Backend unit tests are missing from this pipeline.
      # The pipeline can pass even if the unit tests are broken.

      - name: Install backend dependencies
        run: |
          cd backend
          npm install
      
      - name: check for vulnerabilities in the pipeline and fail if theres more than 3
        run: |
        vulnerabilities=$(npm audit --json | jq '.metadata.vulnerabilities.total')
        echo "Found this many vunlnerabites: $vulnerabilities"
        if [ "$" -gt 3 ]; then
          echo "Too many vulnerabilities"
          exit 1
        fi

      
      - name: Run backend tests
        run: |
          cd backend
          npm test

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run API tests
        run: |
          mkdir -p reports
          newman run postman/quickbook-api.postman_collection.json \
          -e postman/quickbook-render.postman_environment.json \
          -r cli,htmlextra \
          --reporter-htmlextra-export reports/api-report.html

      - name: Install frontend deps
        run: |
          cd frontend
          npm install

      - name: Start frontend
        run: |
          cd frontend
          npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        env:
          CI: true
          VITE_API_BASE_URL: https://quickbook-testing.onrender.com

      - name: Wait for frontend
        run: npx wait-on http://localhost:5173 --timeout 120000

      - name: Show frontend log
        if: always()
        run: cat frontend.log

      - name: Install Cypress binary
        run: npx cypress install

      - name: Verify Cypress
        run: npx cypress verify

      - name: Run Cypress tests
        run: npx cypress run --browser electron

      - name: Upload API report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: api-report
          path: reports/api-report.html

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cypress-screenshots
          path: cypress/screenshots
