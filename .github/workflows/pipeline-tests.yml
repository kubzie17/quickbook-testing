name: tests

on:
  push:
    branches: [ tyreece ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install root dependencies
        run: npm install

      - name: install backend deps
        run: |
          cd backend
          npm install

      - name: run unit tests
        run: |
          cd backend
          npm test

      - name: install newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: run api tests
        run: |
          mkdir -p reports
          newman run postman/quickbook-api.postman_collection.json \
          -e postman/quickbook-render.postman_environment.json \
          -r cli,htmlextra \
          --reporter-htmlextra-export reports/api-report.html

      - name: install frontend deps
        run: |
          cd frontend
          npm install

      - name: start frontend
        run: |
          cd frontend
          npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        env:
          CI: true
          VITE_API_BASE_URL: https://quickbook-testing.onrender.com

      - name: wait for frontend
        run: npx wait-on http://localhost:5173 --timeout 120000

      - name: show frontend log
        if: always()
        run: cat frontend.log

      - name: install cypress binary
        run: npx cypress install

      - name: verify cypress
        run: npx cypress verify

      - name: run cypress tests
        run: npx cypress run --browser electron

      - name: upload api report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-report
          path: reports/api-report.html

      - name: upload cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
