name: Pipeline Test Suite

on: 
  push: 
    branches: [newbranch]


jobs: 
  jobOne: 
    runs-on: ubuntu-latest

    steps: 
      - name: checkout repo
        uses: actions/checkout@v4

      - name: Install node
        uses: actions/setup-node@v4
        with: 
          node-version: 22

      - name: install root dependencies
        run: npm install

      - name: install backend dependencies
        run: |
          cd backend
          npm install

      - name: install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: run frontend
        run: |
          cd frontend
          npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        env: 
          CI: true
          VITE_API_BASE_URL: https://quickbook-testing.onrender.com

      - name: run tests
        run: |
          cd backend
          npm test

      - name: wait for frontend
        run: http://localhost:5173 --timeout 120000


      - name: show the front end log
        if: always()
        run: cat frontend.log


      - name: install cypress
        run: npx cypress install
      
      - name: verify cypress
        run: npx cypres verify

      - name: run cypress tests
        run: npx cypress run --broswer electron