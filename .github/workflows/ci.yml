name: CI/CD Pipeline

# "on" defines WHEN this workflow runs.
# Think of it as: "Hey GitHub, run this recipe when..."

on:
  push:
    branches: [CI/CD]          # ...code is pushed to main
  pull_request:
    branches: [CI/CD]          # ...a PR is opened targeting main
  workflow_dispatch:           # ...someone manually clicks "Run workflow" in GitHub UI


# These are available to ALL jobs in the workflow.
# Centralising config here means you change it in ONE place,
# not scattered across 10 different steps.

env:
  NODE_VERSION: "22"
  VITE_API_BASE_URL: "https://quickbook-testing.onrender.com"

# Principle of least privilege: only grant what's needed.
# In fintech, you NEVER leave permissions wide open.
# "contents: read" means the workflow can read your code but
# can't push changes or delete branches.

permissions:
  contents: read


# Jobs are independent units of work. They run in parallel by
# default. Think of them as separate workers in a factory —
# each one does their own thing on their own machine.
jobs:

  #  Purpose: Catch syntax errors, style issues, bad imports 
  #  Why first: It's fast (seconds). Fail fast, save time.   

  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest     # The machine type — a fresh Ubuntu VM

    steps:
      # Step 1: Get the code onto the machine
      # Without this, the VM is empty — it doesn't have your code.
      - name: Checkout repo 
        uses: actions/checkout@v4

      # Step 2: Install Node.js
      # "uses" means "use a pre-built action someone already made"
      # This is like downloading Node from the website, but automated.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"         # Cache node_modules between runs (faster)

      # Step 3: Install dependencies for the frontend
      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      # Step 4: Run the linter
      # ESLint checks your code for problems without running it.
      # Things like: unused variables, missing imports, style violations.
      - name: Run ESLint
        run: npm run lint
        working-directory: frontend


  #  Purpose: Test individual functions in isolation          
  #  These are your backend utils tests (isValidEmail, etc.) 

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint                # Wait for lint to pass first.
                               # No point testing if code doesn't even lint.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      # Run vitest (the test runner configured in backend/package.json)
      # --reporter=verbose shows each test name and result

      - name: Run unit tests
        run: npx vitest run 
        working-directory: backend

  #  Purpose: Test the backend API endpoints using Postman    
  #  Newman is Postman's CLI runner — same tests, no GUI.    

  api-tests:
    name: API Tests (Newman)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Newman runs Postman collections from the command line.
      # htmlextra generates a nice HTML report we can download later.

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run API tests
        run: |
          newman run postman/quickbook-api.postman_collection.json \
            -e postman/quickbook-render.postman_environment.json \
            -r cli,htmlextra \
            --reporter-htmlextra-export reports/api-report.html

      # Upload the HTML report as an "artifact" — a downloadable file
      # attached to the workflow run. You can grab it from the Actions tab.

      - name: Upload API test report
        if: always()           # Upload even if tests fail — you want the report!
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: reports/api-report.html
          retention-days: 30   # Keep for 30 days, then auto-delete

 
  # │ Purpose: Test the full app like a real user would        
  # │ This spins up the frontend, then runs Cypress against it 

  e2e-tests:
    name: E2E Tests (Cypress)
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests]   # Wait for BOTH to pass first.
                                      # E2E tests are slow and expensive —
                                      # don't waste time if basics are broken.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # Install ALL dependencies (root, frontend, and Cypress)

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      # Start the frontend dev server in the background.
      # The "&" at the end means "run this in the background and continue."
      # Without "&", the workflow would hang here forever waiting for Vite.

      - name: Start frontend dev server
        run: |
          echo "VITE_API_BASE_URL=https://quickbook-testing.onrender.com" > .env
          npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        working-directory: frontend
        env:
          CI: true
          VITE_API_BASE_URL: https://quickbook-testing.onrender.com

      # wait-on polls the URL until it responds (or times out).
      # The frontend takes a few seconds to compile and start serving.

      - name: Wait for frontend to be ready
        run: npx wait-on http://localhost:5173 --timeout 120000

      - name: show the frontend logs
        if: always()
        run: cat frontend.log

      # Install the Cypress binary (the actual browser automation engine)
      - name: Install Cypress binary
        run: npx cypress install

      # Run all Cypress tests headlessly (no visible browser window).
      # In CI there's no screen, so we use Electron (built-in headless browser).
      - name: Run Cypress E2E tests
        run: npx cypress run --browser electron

      # Cypress can save screenshots on failure and videos of test runs.
      # Upload them so you can watch what went wrong.
      - name: Upload Cypress screenshots
        if: failure()          # Only upload if tests FAILED
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 14

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
          retention-days: 14

  
  #  Purpose: Verify the app can be built for production      
  #  "It works on my machine" doesn't cut it in fintech.     
  #  If it can't build in CI, it can't be deployed.          
  
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: e2e-tests           # Only build if ALL tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      # "npm run build" creates the optimised production bundle.
      # If this fails, there's a real problem (missing env vars,
      # import errors, TypeScript issues, etc.)
      
      - name: Build frontend for production
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}

      # Upload the build output so it can be used by a deploy job later.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7
