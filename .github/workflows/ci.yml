# ============================================================
# CI/CD Pipeline — QuickBook
# ============================================================
# This workflow runs automatically when code changes happen.
# It ensures nothing is broken before code reaches production.
#
# Pipeline flow:
#
#          ┌────────┐  ┌──────────────────┐
#          │  LINT  │  │  SECURITY AUDIT  │   ← Fast checks, run in parallel
#          └───┬────┘  └────────┬─────────┘
#              └────────┬───────┘
#         ┌─────────────┼─────────────┐
#         ▼             ▼             ▼
#  ┌────────────┐ ┌──────────┐ ┌──────────┐
#  │ UNIT TESTS │ │ FRONTEND │ │  (slot)  │   ← Middle tier, parallel
#  └─────┬──────┘ └────┬─────┘ └──────────┘
#        └─────────────┤
#                      ▼
#               ┌────────────┐
#               │  CYPRESS   │                ← Expensive, runs last
#               └────────────┘
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [CI/CD]
  pull_request:
    branches: [CI/CD]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  VITE_API_BASE_URL: "https://quickbook-testing.onrender.com"

permissions:
  contents: read

jobs:
  # ── SECURITY AUDIT ─────────────────────────────────────────
  # Scans ALL project dependencies for known vulnerabilities.
  #
  # How npm audit works:
  #   - Checks every package in node_modules against the
  #     GitHub Advisory Database (a public list of known CVEs).
  #   - Returns a severity breakdown: critical, high, moderate, low.
  #   - --audit-level=moderate means it only reports moderate+
  #     (ignores low-severity issues that are usually noise).
  #
  # Why this matters in fintech/insurtech:
  #   - Regulators (FCA, PRA) require you to track and remediate
  #     known vulnerabilities in your software supply chain.
  #   - A single compromised dependency (like the event-stream
  #     incident) can steal customer data.
  #   - This job creates a paper trail — the audit report artifact
  #     proves you checked, even if you chose to accept the risk.
  #
  # The threshold (3) is a pragmatic choice:
  #   - 0 would block every build (most projects have some low-risk issues)
  #   - 3 gives breathing room for known-but-accepted risks
  #   - In production, you'd tighten this over time toward 0
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Install all three sets of dependencies so we can audit them.
      # npm audit only checks what's in node_modules.
      - name: Install all dependencies
        run: |
          npm install
          (cd backend && npm install)
          (cd frontend && npm install)

      # Run npm audit across all three directories.
      # "|| true" prevents the step from failing immediately — we want
      # to count the vulnerabilities ourselves and apply our own threshold.
      #
      # jq breakdown:
      #   .metadata.vulnerabilities    → gets the vulnerability counts object
      #   to_entries                   → converts {low: 1, moderate: 2} to array
      #   map(select(.key != "info"))  → removes "info" severity (just noise)
      #   map(.value)                  → extracts just the numbers
      #   add // 0                     → sums them up (// 0 handles null/empty)
      - name: Run security audit
        run: |
          echo "── Auditing root dependencies ──"
          npm audit --json > audit-root.json 2>&1 || true
          root=$(cat audit-root.json | jq '.metadata.vulnerabilities | to_entries | map(select(.key != "info")) | map(.value) | add // 0')

          echo "── Auditing backend dependencies ──"
          (cd backend && npm audit --json > ../audit-backend.json 2>&1 || true)
          back=$(cat audit-backend.json | jq '.metadata.vulnerabilities | to_entries | map(select(.key != "info")) | map(.value) | add // 0')

          echo "── Auditing frontend dependencies ──"
          (cd frontend && npm audit --json > ../audit-frontend.json 2>&1 || true)
          front=$(cat audit-frontend.json | jq '.metadata.vulnerabilities | to_entries | map(select(.key != "info")) | map(.value) | add // 0')

          total=$(( root + back + front ))

          echo ""
          echo "╔════════════════════════════════════╗"
          echo "║       SECURITY AUDIT SUMMARY       ║"
          echo "╠════════════════════════════════════╣"
          echo "║  Root:      $root vulnerabilities. ║"
          echo "║  Backend:   $back vulnerabilities. ║"
          echo "║  Frontend:  $front vulnerabilities.║"
          echo "║  ────────────────────────────────  ║"
          echo "║  TOTAL:     $total                 ║"
          echo "║  THRESHOLD: 3                      ║"
          echo "╚════════════════════════════════════╝"

          if [ "$total" -gt 3 ]; then
            echo "::error::Security audit FAILED — $total vulnerabilities exceed threshold of 3"
            exit 1
          else
            echo "Security audit PASSED — $total vulnerabilities within threshold"
          fi

      # Upload the raw JSON reports so they can be reviewed or fed into
      # a dashboard. In a real org, these would go to a SIEM or GRC tool.
      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: security-audit-reports
          path: audit-*.json
          retention-days: 30

  # ── LINT & CODE QUALITY ────────────────────────────────────
  # ESLint scans your code WITHOUT running it (static analysis).
  # It catches: unused variables, missing imports, style issues,
  # potential bugs (== vs ===), and React-specific problems.
  #
  # Runs in PARALLEL with security audit — both are fast,
  # both are independent, no reason to wait for one or the other.
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      # Output JSON so we can count errors programmatically.
      # "|| true" lets us handle the exit code ourselves.
      # Threshold of 10 gives room for minor issues while
      # catching major problems.
      - name: Run ESLint
        run: |
          npx eslint . -f json -o eslint-report.json || true

          errors=$(cat eslint-report.json | jq '[.[].errorCount] | add // 0')
          warnings=$(cat eslint-report.json | jq '[.[].warningCount] | add // 0')
          echo "ESLint: $errors errors, $warnings warnings"

          if [ "$errors" -gt 10 ]; then
            echo "::error::ESLint FAILED — $errors errors exceed threshold of 10"
            exit 1
          else
            echo "ESLint PASSED — $errors errors within threshold"
          fi
        working-directory: frontend

      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: eslint-report
          path: frontend/eslint-report.json
          retention-days: 14

  # ── UNIT TESTS ─────────────────────────────────────────────
  # Tests individual functions in isolation (isValidEmail,
  # validateLogin, createBooking, etc.)
  #
  # Depends on BOTH lint and security-audit passing.
  # No point testing code that doesn't lint or has critical CVEs.
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, security-audit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Run unit tests
        run: npx vitest run --reporter=verbose
        working-directory: backend

  # ── FRONTEND BUILD ─────────────────────────────────────────
  # Verifies the app can be compiled for production.
  # Catches: missing env vars, broken imports, TypeScript errors.
  # Runs in PARALLEL with unit tests.
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [lint, security-audit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend for production
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}

  # ── CYPRESS E2E TESTS ─────────────────────────────────────
  # Tests the full app like a real user — clicks buttons,
  # fills forms, checks what appears on screen.
  #
  # This is the MOST EXPENSIVE job (spins up a browser),
  # so it runs LAST after everything else passes.
  cypress:
    name: Cypress E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Start frontend dev server
        run: |
          echo "VITE_API_BASE_URL=https://quickbook-testing.onrender.com" > .env
          npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        working-directory: frontend
        env:
          CI: true
          VITE_API_BASE_URL: https://quickbook-testing.onrender.com

      - name: Wait for frontend to be ready
        run: npx wait-on http://localhost:5173 --timeout 120000

      - name: Show frontend logs
        if: always()
        run: cat frontend.log

      - name: Install Cypress binary
        run: npx cypress install

      - name: Run Cypress E2E tests
        run: npx cypress run --browser electron

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 14

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cypress-videos
          path: cypress/videos
          retention-days: 14
