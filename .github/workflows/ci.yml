name: CI/CD Pipeline

# ── TRIGGERS ─────────────────────────────────────────────────
# "on" defines WHEN this workflow runs.
# Think of it as: "Hey GitHub, run this recipe when..."
on:
  push:
    branches: [CI/CD] # ...code is pushed to CI/CD branch
  pull_request:
    branches: [CI/CD] # ...a PR is opened targeting CI/CD
  workflow_dispatch: # ...someone manually clicks "Run workflow" in GitHub UI

# ── ENVIRONMENT VARIABLES ────────────────────────────────────
# These are available to ALL jobs in the workflow.
# Centralising config here means you change it in ONE place,
# not scattered across 10 different steps.
env:
  NODE_VERSION: "22"
  VITE_API_BASE_URL: "https://quickbook-testing.onrender.com"

# ── PERMISSIONS ──────────────────────────────────────────────
# Principle of least privilege: only grant what's needed.
# In fintech, you NEVER leave permissions wide open.
# "contents: read" means the workflow can read your code but
# can't push changes or delete branches.
permissions:
  contents: read

# ── JOBS ─────────────────────────────────────────────────────
# Jobs are independent units of work. They run in parallel by
# default. Think of them as separate workers in a factory —
# each one does their own thing on their own machine.
#
jobs:
  # ┌─────────────────────────────────────────────────────────┐
  # │ JOB 0: SECURITY AUDIT                                   │
  # │ Purpose: Scan dependencies for known vulnerabilities     │
  # │ Uses npm audit to check every package against the        │
  # │ GitHub Advisory Database. In fintech, shipping code with │
  # │ known CVEs is a compliance failure.                      │
  # │ Threshold: fails if more than 3 vulnerabilities found.   │
  # └─────────────────────────────────────────────────────────┘
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Audit all three package directories: root, backend, frontend.
      # npm audit --json outputs machine-readable results.
      # We count total vulnerabilities and fail if they exceed the threshold.
      - name: Audit root dependencies
        run: |
          npm install
          npm audit --json > root-audit.json || true
          root_vulns=$(cat root-audit.json | jq '.metadata.vulnerabilities | to_entries | map(.value) | add // 0')
          echo "Root vulnerabilities: $root_vulns"
          echo "root_vulns=$root_vulns" >> $GITHUB_ENV

      - name: Audit backend dependencies
        run: |
          npm install
          npm audit --json > backend-audit.json || true
          backend_vulns=$(cat backend-audit.json | jq '.metadata.vulnerabilities | to_entries | map(.value) | add // 0')
          echo "Backend vulnerabilities: $backend_vulns"
          echo "backend_vulns=$backend_vulns" >> $GITHUB_ENV
        working-directory: backend

      - name: Audit frontend dependencies
        run: |
          npm install
          npm audit --json > frontend-audit.json || true
          frontend_vulns=$(cat frontend-audit.json | jq '.metadata.vulnerabilities | to_entries | map(.value) | add // 0')
          echo "Frontend vulnerabilities: $frontend_vulns"
          echo "frontend_vulns=$frontend_vulns" >> $GITHUB_ENV
        working-directory: frontend

      # Total up all vulnerabilities and enforce the threshold.
      # In production, you'd set this to 0 for critical/high.
      - name: Check vulnerability threshold
        run: |
          total=$(( ${{ env.root_vulns }} + ${{ env.backend_vulns }} + ${{ env.frontend_vulns }} ))
          echo "========================================"
          echo "  SECURITY AUDIT SUMMARY"
          echo "========================================"
          echo "  Root:     ${{ env.root_vulns }} vulnerabilities"
          echo "  Backend:  ${{ env.backend_vulns }} vulnerabilities"
          echo "  Frontend: ${{ env.frontend_vulns }} vulnerabilities"
          echo "  TOTAL:    $total vulnerabilities"
          echo "  THRESHOLD: 3"
          echo "========================================"

          if [ "$total" -gt 3 ]; then
            echo "SECURITY AUDIT FAILED: $total vulnerabilities exceed threshold of 3"
            exit 1
          else
            echo "SECURITY AUDIT PASSED: $total vulnerabilities within threshold of 3"
          fi

      # Upload audit reports as artifacts for review
      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: security-audit-reports
          path: |
            root-audit.json
            backend/backend-audit.json
            frontend/frontend-audit.json
          retention-days: 30

  #  JOB 1: LINT & CODE QUALITY
  #  Purpose: Catch syntax errors, style issues, bad imports
  #  Why first: It's fast (seconds). Fail fast, save time.

  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest # The machine type — a fresh Ubuntu VM

    steps:
      # Step 1: Get the code onto the machine
      # Without this, the VM is empty — it doesn't have your code.
      - name: Checkout code
        uses: actions/checkout@v5

      # Step 2: Install Node.js
      # "uses" means "use a pre-built action someone already made"
      # This is like downloading Node from the website, but automated.
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm" # Cache node_modules between runs (faster)

      # Step 3: Install dependencies for the frontend
      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      # Step 4: Run the linter with error threshold
      # ESLint checks your code for problems without running it.
      # We output JSON, count total errors, and fail if they exceed a threshold.
      # This gives you flexibility — a few minor issues won't block the pipeline,
      # but a flood of errors will.
      - name: Run ESLint
        run: |
          npm i eslint
          npx eslint . -f json -o eslint-report.json || true

          errors=$(cat eslint-report.json | jq '[.[].errorCount] | add')
          warnings=$(cat eslint-report.json | jq '[.[].warningCount] | add')
          echo "ESLint results: $errors errors, $warnings warnings"

          if [ "$errors" -gt 10 ]; then
            echo "ESLint FAILED: Error count ($errors) exceeds threshold of 10"
            exit 1
          else
            echo "ESLint PASSED: Error count ($errors) is within threshold of 10"
          fi
        working-directory: frontend

      # Upload the ESLint report as an artifact so you can review it.
      # "if: always()" ensures the report is uploaded even if the step above failed.
      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: eslint-report
          path: frontend/eslint-report.json
          retention-days: 14

  #  JOB 2: UNIT TESTS
  #  Purpose: Test individual functions in isolation
  #  These are your backend utils tests (isValidEmail, etc.)

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, security-audit] # Wait for both lint and security audit to pass.

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      # Run vitest (the test runner configured in backend/package.json)
      # --reporter=verbose shows each test name and result
      - name: Run unit tests
        run: npx vitest run --reporter=verbose
        working-directory: backend

  #  JOB 4: FRONTEND
  #  Purpose: Verify the frontend app can be built for prod
  #  "It works on my machine" doesn't cut it in fintech.
  #  If it can't build in CI, it can't be deployed.
  #  Runs in PARALLEL with unit tests and API tests.

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [lint, security-audit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

  #  JOB 5: CYPRESS E2E TESTS
  #  Purpose: Test the full app like a real user would
  #  This is the most expensive job — it spins up the
  #  frontend, opens a headless browser, and clicks through
  #  the app. That's why it runs LAST, after everything else
  #  passes. No point running a 5-min browser test if a
  #  10-second unit test already failed.
  #
  #  needs: [unit-tests, frontend] means BOTH
  #  must pass before this job starts.

  cypress:
    name: Cypress E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # Install root dependencies (includes wait-on and cypress)
      - name: Install root dependencies
        run: npm install

      # Install frontend dependencies so Vite can start the dev server
      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      # Start the frontend dev server in the background.
      # The "&" at the end means "run this in the background and continue."
      # Without "&", the workflow would hang here forever waiting for Vite.
      # We also create a .env file to make sure Vite picks up the API URL.
      - name: Start frontend dev server
        run: |
          echo "VITE_API_BASE_URL=https://quickbook-testing.onrender.com" > .env
          npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        working-directory: frontend
        env:
          CI: true
          VITE_API_BASE_URL: https://quickbook-testing.onrender.com

      # wait-on polls the URL until it responds (or times out).
      # The frontend takes a few seconds to compile and start serving.
      - name: Wait for frontend to be ready
        run: npx wait-on http://localhost:5173 --timeout 120000

      # Show the frontend logs — useful for debugging if Vite fails to start.
      # "if: always()" means this runs even if the previous step failed.
      - name: Show frontend logs
        if: always()
        run: cat frontend.log

      # Install the Cypress binary (the actual browser automation engine).
      # The npm package is just a wrapper — the binary is the real thing....
      - name: Install Cypress binary
        run: npx cypress install

      # Run all Cypress tests headlessly (no visible browser window).
      # In CI there's no screen, so we use Electron (built-in headless browser).
      - name: Run Cypress E2E tests
        run: npx cypress run --browser electron
