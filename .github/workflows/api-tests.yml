name: Full Test Suite

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      # -------------------------
      # API TESTS (NEWMAN)
      # -------------------------
      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run API tests
        run: |
          newman run postman/quickbook-api.postman_collection.json \
          -e postman/quickbook-render.postman_environment.json \
          -r cli,htmlextra \
          --reporter-htmlextra-export reports/api-report.html

      # -------------------------
      # FRONTEND (VITE)
      # -------------------------
      - name: Install frontend deps
        run: |
          cd frontend
          npm install

      - name: Start frontend
        run: |
          cd frontend
          npm run dev &
        env:
          CI: true

      - name: Wait for frontend
        run: npx wait-on http://127.0.0.1:5173

      # -------------------------
      # CYPRESS TESTS
      # -------------------------
      - name: Run Cypress tests
        run: npx cypress run --browser electron

      # -------------------------
      # UPLOAD REPORT
      # -------------------------
      - name: Upload API report
        uses: actions/upload-artifact@v4
        with:
          name: api-report
          path: reports/api-report.html